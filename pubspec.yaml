name: front_office_mobile
description: Plateforme Sociale Togo - Front Office Chef de Ménage
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP
  http: ^1.2.0
  # Stockage local JWT
  flutter_secure_storage: ^9.0.0
  # Navigation
  go_router: ^13.0.0
  # UI
  google_fonts: ^6.1.0
  # Icônes
  flutter_svg: ^2.0.9
  # Animations
  lottie: ^3.0.0
  # State management
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
